<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Swarna ✨</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Inter:wght@300;400;700&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; overflow: hidden; font-family: 'Inter', sans-serif; color: white; }

        .scene {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            display: flex; align-items: flex-end; justify-content: center;
            overflow: hidden; perspective: 1000px; transition: opacity 2s ease;
        }

        /* ===== LANDING PAGE ===== */
        #landing-page { z-index: 50; background: #000; align-items: center; }
        .text-primary-pink { color: #FF69B4; }

        /* ===== GARDEN PAGE ===== */
        #garden-page { z-index: 20; opacity: 0; pointer-events: none; }
        
        /* Night Background */
        .night { position: absolute; left: 50%; top: 0; transform: translateX(-50%); width: 100vw; height: 100vh; filter: blur(0.1vmin); background-image: radial-gradient(ellipse at top, transparent 0%, #000), radial-gradient(ellipse at bottom, #000, rgba(145, 233, 255, 0.2)), repeating-linear-gradient(220deg, rgb(0, 0, 0) 0px, rgb(0, 0, 0) 19px, transparent 19px, transparent 22px), repeating-linear-gradient(189deg, rgb(0, 0, 0) 0px, rgb(0, 0, 0) 19px, transparent 19px, transparent 22px), repeating-linear-gradient(148deg, rgb(0, 0, 0) 0px, rgb(0, 0, 0) 19px, transparent 19px, transparent 22px), linear-gradient(90deg, rgb(0, 255, 250), rgb(240, 240, 240)); z-index: 1; }

        /* Poetry Overlay */
        #poetry-overlay {
            position: absolute; top: 15%; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 800px; text-align: center; z-index: 100;
        }
        #poetry-text {
            font-family: 'Dancing Script', cursive; font-size: 3rem; color: #a7ffee;
            text-shadow: 0 0 20px rgba(167, 255, 238, 0.8), 0 0 40px #FF69B4;
            opacity: 0; transition: opacity 1.5s ease-in-out;
        }

        /* Galaxy Button */
        #universe-btn {
            position: absolute; top: 20px; right: 20px; z-index: 100; padding: 10px 25px;
            background: rgba(20, 117, 122, 0.5); border: 1px solid #39c6d6; color: #a7ffee;
            border-radius: 20px; cursor: pointer; transition: 0.3s; display: none;
        }
        #universe-btn:hover { background: rgba(39, 167, 172, 0.9); transform: scale(1.05); }

        /* ===== FLOWERS CSS (From your original file) ===== */
        .flowers { position: relative; transform: scale(0.9); z-index: 10; }
        .flower { position: absolute; bottom: 10vmin; transform-origin: bottom center; z-index: 10; --fl-speed: 0.8s; }
        .flower--1 { animation: moving-flower-1 4s linear infinite; }
        .flower--1 .flower__line { height: 70vmin; animation-delay: 0.3s; }
        .flower--1 .flower__line__leaf--1 { animation: blooming-leaf-right var(--fl-speed) 1.6s backwards; }
        .flower--1 .flower__line__leaf--2 { animation: blooming-leaf-right var(--fl-speed) 1.4s backwards; }
        .flower--1 .flower__line__leaf--3 { animation: blooming-leaf-left var(--fl-speed) 1.2s backwards; }
        .flower--1 .flower__line__leaf--4 { animation: blooming-leaf-left var(--fl-speed) 1s backwards; }
        .flower--1 .flower__line__leaf--5 { animation: blooming-leaf-right var(--fl-speed) 1.8s backwards; }
        .flower--1 .flower__line__leaf--6 { animation: blooming-leaf-left var(--fl-speed) 2s backwards; }
        .flower--2 { left: 50%; transform: rotate(20deg); animation: moving-flower-2 4s linear infinite; }
        .flower--2 .flower__line { height: 60vmin; animation-delay: 0.6s; }
        .flower--2 .flower__line__leaf--1 { animation: blooming-leaf-right var(--fl-speed) 1.9s backwards; }
        .flower--2 .flower__line__leaf--2 { animation: blooming-leaf-right var(--fl-speed) 1.7s backwards; }
        .flower--2 .flower__line__leaf--3 { animation: blooming-leaf-left var(--fl-speed) 1.5s backwards; }
        .flower--2 .flower__line__leaf--4 { animation: blooming-leaf-left var(--fl-speed) 1.3s backwards; }
        .flower--3 { left: 50%; transform: rotate(-15deg); animation: moving-flower-3 4s linear infinite; }
        .flower--3 .flower__line { animation-delay: 0.9s; }
        .flower--3 .flower__line__leaf--1 { animation: blooming-leaf-right var(--fl-speed) 2.5s backwards; }
        .flower--3 .flower__line__leaf--2 { animation: blooming-leaf-right var(--fl-speed) 2.3s backwards; }
        .flower--3 .flower__line__leaf--3 { animation: blooming-leaf-left var(--fl-speed) 2.1s backwards; }
        .flower--3 .flower__line__leaf--4 { animation: blooming-leaf-left var(--fl-speed) 1.9s backwards; }
        .flower__leafs { position: relative; animation: blooming-flower 2s backwards; }
        .flower__leafs--1 { animation-delay: 1.1s; }
        .flower__leafs--2 { animation-delay: 1.4s; }
        .flower__leafs--3 { animation-delay: 1.7s; }
        .flower__leafs::after { content: ""; position: absolute; left: 0; top: 0; transform: translate(-50%, -100%); width: 8vmin; height: 8vmin; background-color: #6bf0ff; filter: blur(10vmin); }
        .flower__leaf { position: absolute; bottom: 0; left: 50%; width: 8vmin; height: 11vmin; border-radius: 51% 49% 47% 53% / 44% 45% 55% 69%; background-color: #a7ffee; background-image: linear-gradient(to top, #54b8aa, #a7ffee); transform-origin: bottom center; opacity: 0.9; box-shadow: inset 0 0 2vmin rgba(255, 255, 255, 0.5); }
        .flower__leaf--1 { transform: translate(-10%, 1%) rotateY(40deg) rotateX(-50deg); }
        .flower__leaf--2 { transform: translate(-50%, -4%) rotateX(40deg); }
        .flower__leaf--3 { transform: translate(-90%, 0%) rotateY(45deg) rotateX(50deg); }
        .flower__leaf--4 { width: 8vmin; height: 8vmin; transform-origin: bottom left; border-radius: 4vmin 10vmin 4vmin 4vmin; transform: translate(0%, 18%) rotateX(70deg) rotate(-43deg); background-image: linear-gradient(to top, #39c6d6, #a7ffee); z-index: 1; opacity: 0.8; }
        .flower__white-circle { position: absolute; left: -3.5vmin; top: -3vmin; width: 9vmin; height: 4vmin; border-radius: 50%; background-color: #fff; }
        .flower__white-circle::after { content: ""; position: absolute; left: 50%; top: 45%; transform: translate(-50%, -50%); width: 60%; height: 60%; border-radius: inherit; background-image: repeating-linear-gradient(135deg, rgba(0,0,0,0.03) 0px, rgba(0,0,0,0.03) 1px, transparent 1px, transparent 12px), repeating-linear-gradient(45deg, rgba(0,0,0,0.03) 0px, rgba(0,0,0,0.03) 1px, transparent 1px, transparent 12px), repeating-linear-gradient(67.5deg, rgba(0,0,0,0.03) 0px, rgba(0,0,0,0.03) 1px, transparent 1px, transparent 12px), linear-gradient(90deg, rgb(255, 235, 18), rgb(255, 206, 0)); }
        .flower__line { height: 55vmin; width: 1.5vmin; background-image: linear-gradient(to left, rgba(0,0,0,0.2), transparent, rgba(255,255,255,0.2)), linear-gradient(to top, transparent 10%, #14757a, #39c6d6); box-shadow: inset 0 0 2px rgba(0,0,0,0.5); animation: grow-flower-tree 4s backwards; }
        .flower__line__leaf { --w: 7vmin; --h: calc(var(--w) + 2vmin); position: absolute; top: 20%; left: 90%; width: var(--w); height: var(--h); border-top-right-radius: var(--h); border-bottom-left-radius: var(--h); background-image: linear-gradient(to top, rgba(20, 117, 122, 0.4), #39c6d6); }
        .flower__line__leaf--1 { transform: rotate(70deg) rotateY(30deg); }
        .flower__line__leaf--2 { top: 45%; transform: rotate(70deg) rotateY(30deg); }
        .flower__line__leaf--3, .flower__line__leaf--4, .flower__line__leaf--6 { border-top-right-radius: 0; border-bottom-left-radius: 0; border-top-left-radius: var(--h); border-bottom-right-radius: var(--h); left: -460%; top: 12%; transform: rotate(-70deg) rotateY(30deg); }
        .flower__line__leaf--4 { top: 40%; }
        .flower__line__leaf--5 { top: 0; transform-origin: left; transform: rotate(70deg) rotateY(30deg) scale(0.6); }
        .flower__line__leaf--6 { top: -2%; left: -450%; transform-origin: right; transform: rotate(-70deg) rotateY(30deg) scale(0.6); }
        
        .long-g { position: absolute; bottom: 25vmin; left: -42vmin; transform-origin: bottom left; }
        .long-g--1 { bottom: 0vmin; transform: scale(0.8) rotate(-5deg); }
        .long-g--2, .long-g--3 { bottom: -3vmin; left: -35vmin; transform-origin: center; transform: scale(0.6) rotateX(60deg); }
        .long-g--4 { left: 25vmin; bottom: -3vmin; transform-origin: center; transform: scale(0.6) rotateX(60deg); }
        .long-g--5 { left: 42vmin; bottom: 0vmin; transform: scale(0.8) rotate(2vmin); }
        .long-g--6 { left: 0vmin; bottom: -20vmin; z-index: 100; filter: blur(0.3vmin); transform: scale(0.8) rotate(2deg); }
        .long-g--7 { left: 35vmin; bottom: 20vmin; z-index: -1; filter: blur(0.3vmin); transform: scale(0.6) rotate(2deg); opacity: 0.6; }
        .long-g .leaf { --w: 15vmin; --h: 40vmin; --c: #1aaa15; position: absolute; bottom: 0; width: var(--w); height: var(--h); border-top-left-radius: 100%; border-left: 2vmin solid var(--c); transform-origin: bottom center; }
        .long-g .leaf--0 { left: 2vmin; animation: leaf-ans-1 4s linear infinite; }
        .long-g .leaf--1 { --w: 5vmin; --h: 60vmin; animation: leaf-ans-1 4s linear infinite; }
        .long-g .leaf--2 { --w: 10vmin; --h: 40vmin; left: -0.5vmin; bottom: 5vmin; transform-origin: bottom left; transform: rotateY(-180deg); animation: leaf-ans-2 3s linear infinite; }
        .long-g .leaf--3 { --w: 5vmin; --h: 30vmin; left: -1vmin; bottom: 3.2vmin; transform-origin: bottom left; transform: rotate(-10deg) rotateY(-180deg); animation: leaf-ans-3 3s linear infinite; }
        .grow-ans { animation: grow-ans 2s var(--d) backwards; }

        @keyframes leaf-ans-1 { 0%, 100% { transform: rotate(-5deg) scale(1); } 50% { transform: rotate(5deg) scale(1.1); } }
        @keyframes leaf-ans-2 { 0%, 100% { transform: rotateY(-180deg) rotate(5deg); } 50% { transform: rotateY(-180deg) rotate(0deg) scale(1.1); } }
        @keyframes leaf-ans-3 { 0%, 100% { transform: rotate(-10deg) rotateY(-180deg); } 50% { transform: rotate(-20deg) rotateY(-180deg); } }
        @keyframes grow-ans { 0% { transform: scale(0); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        @keyframes moving-flower-1 { 0%, 100% { transform: rotate(2deg); } 50% { transform: rotate(-2deg); } }
        @keyframes moving-flower-2 { 0%, 100% { transform: rotate(18deg); } 50% { transform: rotate(14deg); } }
        @keyframes moving-flower-3 { 0%, 100% { transform: rotate(-18deg); } 50% { transform: rotate(-20deg) scale(0.9); } }
        @keyframes blooming-leaf-right { 0% { transform-origin: left; transform: rotate(70deg) rotateY(30deg) scale(0); } }
        @keyframes blooming-leaf-left { 0% { transform-origin: right; transform: rotate(-70deg) rotateY(30deg) scale(0); } }
        @keyframes grow-flower-tree { 0% { height: 0; border-radius: 1vmin; } }
        @keyframes blooming-flower { 0% { transform: scale(0); } }

        /* ===== GALAXY PAGE ===== */
        #galaxy-page {
            z-index: 30; opacity: 0; pointer-events: none; align-items: center; background: radial-gradient(circle at center, #1b0033 0%, #000 100%);
        }
        .star { position: absolute; background: #fff; border-radius: 50%; animation: twinkle infinite ease-in-out alternate; }
        @keyframes twinkle { 0% { opacity: 0.2; } 100% { opacity: 1; box-shadow: 0 0 5px #fff; } }

        .final-message { text-align: center; z-index: 40; padding: 30px; max-width: 900px; }
        .final-message h1 { font-family: 'Dancing Script', cursive; font-size: 4.5rem; color: #ff9a9e; margin-bottom: 20px; text-shadow: 0 0 20px #ff9a9e; }
        .final-message p { font-size: 1.5rem; line-height: 1.8; color: #e0e0e0; }

    </style>
</head>
<body>

    <audio id="bg-music" loop>
        <source src="song.mp3" type="audio/mpeg">
    </audio>

    <div id="landing-page" class="scene flex flex-col transition-opacity duration-1000">
        <div class="text-center space-y-8">
            <h1 class="text-7xl font-extrabold text-primary-pink tracking-widest animate-pulse" style="text-shadow: 0 0 20px #ff69b4;">TIKKI</h1>
            <p class="text-3xl italic font-light animate-bounce">For Swarna, my pasandida aurat ✨</p>
            <button id="start-btn" class="mt-12 px-10 py-4 text-2xl font-bold bg-primary-pink text-white rounded-full shadow-lg hover:scale-105 transition-all">
                Open Here 🌸
            </button>
        </div>
    </div>

    <div id="garden-page" class="scene">
        <div class="night"></div>
        
        <button id="universe-btn">Show me the universe 🌌</button>

        <div id="poetry-overlay">
            <div id="poetry-text"></div>
        </div>

        <div class="flowers">
            <div class="flower flower--1">
                <div class="flower__leafs flower__leafs--1"><div class="flower__leaf flower__leaf--1"></div><div class="flower__leaf flower__leaf--2"></div><div class="flower__leaf flower__leaf--3"></div><div class="flower__leaf flower__leaf--4"></div><div class="flower__white-circle"></div></div>
                <div class="flower__line"><div class="flower__line__leaf flower__line__leaf--1"></div><div class="flower__line__leaf flower__line__leaf--2"></div><div class="flower__line__leaf flower__line__leaf--3"></div><div class="flower__line__leaf flower__line__leaf--4"></div><div class="flower__line__leaf flower__line__leaf--5"></div><div class="flower__line__leaf flower__line__leaf--6"></div></div>
            </div>
            <div class="flower flower--2">
                <div class="flower__leafs flower__leafs--2"><div class="flower__leaf flower__leaf--1"></div><div class="flower__leaf flower__leaf--2"></div><div class="flower__leaf flower__leaf--3"></div><div class="flower__leaf flower__leaf--4"></div><div class="flower__white-circle"></div></div>
                <div class="flower__line"><div class="flower__line__leaf flower__line__leaf--1"></div><div class="flower__line__leaf flower__line__leaf--2"></div><div class="flower__line__leaf flower__line__leaf--3"></div><div class="flower__line__leaf flower__line__leaf--4"></div></div>
            </div>
            <div class="flower flower--3">
                <div class="flower__leafs flower__leafs--3"><div class="flower__leaf flower__leaf--1"></div><div class="flower__leaf flower__leaf--2"></div><div class="flower__leaf flower__leaf--3"></div><div class="flower__leaf flower__leaf--4"></div><div class="flower__white-circle"></div></div>
                <div class="flower__line"><div class="flower__line__leaf flower__line__leaf--1"></div><div class="flower__line__leaf flower__line__leaf--2"></div><div class="flower__line__leaf flower__line__leaf--3"></div><div class="flower__line__leaf flower__line__leaf--4"></div></div>
            </div>
            <div class="long-g long-g--1"><div class="grow-ans" style="--d:3.6s"><div class="leaf leaf--0"></div></div><div class="grow-ans" style="--d:3.8s"><div class="leaf leaf--1"></div></div><div class="grow-ans" style="--d:4s"><div class="leaf leaf--2"></div></div><div class="grow-ans" style="--d:4.2s"><div class="leaf leaf--3"></div></div></div>
            <div class="long-g long-g--2"><div class="grow-ans" style="--d:4.2s"><div class="leaf leaf--1"></div></div><div class="grow-ans" style="--d:4.4s"><div class="leaf leaf--2"></div></div><div class="grow-ans" style="--d:4.6s"><div class="leaf leaf--3"></div></div></div>
            <div class="long-g long-g--3"><div class="grow-ans" style="--d:4s"><div class="leaf leaf--0"></div></div><div class="grow-ans" style="--d:4.2s"><div class="leaf leaf--1"></div></div><div class="grow-ans" style="--d:3s"><div class="leaf leaf--2"></div></div><div class="grow-ans" style="--d:3.6s"><div class="leaf leaf--3"></div></div></div>
        </div>
    </div>

    <div id="galaxy-page" class="scene flex-col">
        <div id="stars-container"></div>
        <div class="final-message">
            <h1>Swarna, My Pasandida Aurat</h1>
            <p>Look at all these stars... In this universe full of countless people, you are the only one I got.<br> 
               All I will ever want in this lifetime is you and your happiness.<br><br>
               I only love you. ❤️</p>
        </div>
    </div>

    <script>
        const poems = [
            "For Swarna, my absolute pasandida aurat...",
            "Your eyes hold more depth than the deepest oceans.",
            "Tumhari aawaz sunta hoon, toh saari thakan chali jaati hai.",
            "Those cute little nakhre? I live for them everyday.",
            "You are the literal definition of perfect to me.",
            "Tumhari bachkani harkatein mujhe aur bhi deewana banati hain.",
            "In a room full of art, I would still only stare at you.",
            "Mera sukoon sirf tumse hai, Swarna.",
            "The way you smile makes my whole world stop.",
            "Tum gussa bhi hoti ho toh bohot pyari lagti ho.",
            "My favorite place in the entire world is right next to you.",
            "Tumhari aankhon mein puri duniya dekhta hoon main.",
            "Every time you laugh, a new flower blooms in my heart.",
            "Tumhara zikr meri har dua mein hota hai.",
            "You are not just my love, you are my safe space.",
            "Tumhare bina mera din adhoora sa lagta hai.",
            "I could listen to your voice for hours and never get tired.",
            "Tumhara meri life mein aana sabse khoobsurat ittefaq tha.",
            "Even your tiny flaws are absolutely flawless to me.",
            "Tumhari ek jhalak mere poore din ko roshan kar deti hai.",
            "I love the way your nose scrunches up when you smile.",
            "Meri har subah ki pehli soch sirf tum ho.",
            "You make me want to be the best version of myself for you.",
            "Tumhari baaton mein waqt ka pata hi nahi chalta.",
            "I never truly knew what perfect was until I met you.",
            "Tum mere dil ki sabse keemti dhadkan ho.",
            "Your presence feels like a warm, comforting hug to my soul.",
            "Tumhare saath bitaya har ek lamha mere liye yaadgaar hai.",
            "I fall in love with you a little more every single day.",
            "Swarna... tum sirf meri ho, aur main sirf tumhara.",
            "No matter where life takes us, you are my ultimate home."
        ];

        const startBtn = document.getElementById('start-btn');
        const landingPage = document.getElementById('landing-page');
        const gardenPage = document.getElementById('garden-page');
        const galaxyPage = document.getElementById('galaxy-page');
        const poetryText = document.getElementById('poetry-text');
        const universeBtn = document.getElementById('universe-btn');
        const bgMusic = document.getElementById('bg-music');
        const starsContainer = document.getElementById('stars-container');

        let poemIndex = 0;
        let poetryInterval;

        // 1. Generate Galaxy Stars Early
        for(let i=0; i<150; i++) {
            let star = document.createElement('div');
            star.className = 'star';
            star.style.left = Math.random() * 100 + 'vw';
            star.style.top = Math.random() * 100 + 'vh';
            let size = Math.random() * 3;
            star.style.width = size + 'px';
            star.style.height = size + 'px';
            star.style.animationDuration = (Math.random() * 2 + 1) + 's';
            starsContainer.appendChild(star);
        }

        // 2. Start Button Logic
        startBtn.addEventListener('click', () => {
            // Play Music
            bgMusic.play().catch(() => console.log("Add song.mp3 to folder!"));
            
            // Hide Landing, Show Garden
            landingPage.style.opacity = '0';
            setTimeout(() => {
                landingPage.style.display = 'none';
                gardenPage.style.opacity = '1';
                gardenPage.style.pointerEvents = 'all';
                
                // Show Universe button after 5 seconds so she enjoys the garden first
                setTimeout(() => { universeBtn.style.display = 'block'; }, 5000);

                // Start Poetry Cycle
                poetryText.innerText = poems[0];
                poetryText.style.opacity = '1';
                
                poetryInterval = setInterval(() => {
                    poetryText.style.opacity = '0'; // Fade out
                    setTimeout(() => {
                        poemIndex = (poemIndex + 1) % poems.length;
                        poetryText.innerText = poems[poemIndex];
                        poetryText.style.opacity = '1'; // Fade in
                    }, 1500);
                }, 5000); // Change text every 5 seconds
                
            }, 1000);
        });

        // 3. To Galaxy Logic
        universeBtn.addEventListener('click', () => {
            clearInterval(poetryInterval);
            gardenPage.style.opacity = '0';
            gardenPage.style.pointerEvents = 'none';
            
            setTimeout(() => {
                gardenPage.style.display = 'none';
                galaxyPage.style.opacity = '1';
                galaxyPage.style.pointerEvents = 'all';
            }, 2000);
        });
    </script>
</body>
</html>
