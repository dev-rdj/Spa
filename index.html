<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Swarna ✨</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Poppins:wght@300;400;600&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; overflow: hidden; background: #000; color: #fff; }

        /* --- GARDEN SECTION --- */
        #garden-section {
            position: absolute; width: 100vw; height: 100vh;
            background: linear-gradient(to bottom, #02111d, #0a2e1f);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 2s ease-in-out; z-index: 10;
        }

        /* Fireflies */
        .firefly {
            position: absolute; width: 4px; height: 4px; background: #c6ffdd;
            border-radius: 50%; box-shadow: 0 0 10px #c6ffdd, 0 0 20px #fbd786;
            animation: float 4s infinite ease-in-out alternate; opacity: 0.8;
        }
        @keyframes float {
            0% { transform: translateY(0) translateX(0) scale(1); opacity: 0.5; }
            100% { transform: translateY(-100px) translateX(50px) scale(1.5); opacity: 1; }
        }

        /* Poetry Display */
        .poetry-container {
            text-align: center; padding: 20px; z-index: 20;
            max-width: 800px; height: 150px; display: flex; align-items: center; justify-content: center;
        }
        #poetry-text {
            font-family: 'Dancing Script', cursive; font-size: 2.5rem; color: #fbd786;
            text-shadow: 0 0 15px rgba(251, 215, 134, 0.5);
            opacity: 1; transition: opacity 1s ease-in-out;
        }

        /* Start Button */
        #start-btn {
            position: absolute; z-index: 50; padding: 15px 40px;
            font-family: 'Poppins', sans-serif; font-size: 1.2rem; font-weight: 600;
            background: rgba(251, 215, 134, 0.1); color: #fbd786;
            border: 2px solid #fbd786; border-radius: 30px; cursor: pointer;
            backdrop-filter: blur(5px); transition: all 0.3s ease;
        }
        #start-btn:hover { background: #fbd786; color: #0a2e1f; box-shadow: 0 0 20px #fbd786; }

        /* Galaxy Button */
        #to-galaxy-btn {
            margin-top: 40px; padding: 10px 30px; font-size: 1rem;
            background: transparent; color: #fff; border: 1px solid rgba(255,255,255,0.3);
            border-radius: 20px; cursor: pointer; z-index: 20; display: none; transition: 0.3s;
        }
        #to-galaxy-btn:hover { background: rgba(255,255,255,0.1); border-color: #fff; }

        /* --- GALAXY SECTION --- */
        #galaxy-section {
            position: absolute; width: 100vw; height: 100vh;
            background: radial-gradient(circle at center, #1b0033 0%, #000000 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none; transition: opacity 3s ease-in-out; z-index: 5;
        }

        /* Stars */
        .star {
            position: absolute; background: #fff; border-radius: 50%;
            animation: twinkle infinite ease-in-out alternate;
        }
        @keyframes twinkle { 0% { opacity: 0.2; } 100% { opacity: 1; box-shadow: 0 0 5px #fff; } }

        /* Final Message */
        .final-message {
            text-align: center; z-index: 20; padding: 30px; max-width: 900px;
        }
        .final-message h1 { font-family: 'Dancing Script', cursive; font-size: 4rem; color: #ff9a9e; margin-bottom: 20px; text-shadow: 0 0 20px #ff9a9e; }
        .final-message p { font-size: 1.5rem; line-height: 1.8; color: #e0e0e0; }
        
        /* Audio Player (Hidden but active) */
        audio { display: none; }
    </style>
</head>
<body>

    <audio id="bg-music" loop>
        <source src="song.mp3" type="audio/mpeg">
    </audio>

    <button id="start-btn">Click for Swarna's Magic ✨</button>

    <div id="garden-section">
        <div class="poetry-container">
            <div id="poetry-text"></div>
        </div>
        <button id="to-galaxy-btn">Show me the universe 🌌</button>
    </div>

    <div id="galaxy-section">
        <div class="final-message">
            <h1>Swarna, My Pasandida Aurat</h1>
            <p>Look at all these stars... In this universe full of countless people, you are the only one I got.<br> 
               All I will ever want in this lifetime is you and your happiness.<br><br>
               I only love you. ❤️</p>
        </div>
    </div>

    <script>
        // 30+ Poetic lines about Swarna
        const poems = [
            "For Swarna, my absolute pasandida aurat...",
            "Your eyes hold more depth than the deepest oceans.",
            "Tumhari aawaz sunta hoon, toh saari thakan chali jaati hai.",
            "Those cute little nakhre? I live for them everyday.",
            "You are the literal definition of perfect to me.",
            "Tumhari bachkani harkatein mujhe aur bhi deewana banati hain.",
            "In a room full of art, I would still only stare at you.",
            "Mera sukoon sirf tumse hai, Swarna.",
            "The way you smile makes my whole world stop.",
            "Tum gussa bhi hoti ho toh bohot pyari lagti ho.",
            "My favorite place in the entire world is right next to you.",
            "Tumhari aankhon mein puri duniya dekhta hoon main.",
            "Every time you laugh, a new flower blooms in my heart.",
            "Tumhara zikr meri har dua mein hota hai.",
            "You are not just my love, you are my safe space.",
            "Tumhare bina mera din adhoora sa lagta hai.",
            "I could listen to your voice for hours and never get tired.",
            "Tumhara meri life mein aana sabse khoobsurat ittefaq tha.",
            "Even your tiny flaws are absolutely flawless to me.",
            "Tumhari ek jhalak mere poore din ko roshan kar deti hai.",
            "I love the way your nose scrunches up when you smile.",
            "Meri har subah ki pehli soch sirf tum ho.",
            "You make me want to be the best version of myself for you.",
            "Tumhari baaton mein waqt ka pata hi nahi chalta.",
            "I never truly knew what perfect was until I met you.",
            "Tum mere dil ki sabse keemti dhadkan ho.",
            "Your presence feels like a warm, comforting hug to my soul.",
            "Tumhare saath bitaya har ek lamha mere liye yaadgaar hai.",
            "I fall in love with you a little more every single day.",
            "Swarna... tum sirf meri ho, aur main sirf tumhara.",
            "No matter where life takes us, you are my ultimate home."
        ];

        // --- Generate Fireflies for Garden ---
        const garden = document.getElementById('garden-section');
        for(let i=0; i<40; i++) {
            let firefly = document.createElement('div');
            firefly.className = 'firefly';
            firefly.style.left = Math.random() * 100 + 'vw';
            firefly.style.top = Math.random() * 100 + 'vh';
            firefly.style.animationDuration = (Math.random() * 3 + 2) + 's';
            firefly.style.animationDelay = Math.random() * 2 + 's';
            garden.appendChild(firefly);
        }

        // --- Generate Stars for Galaxy ---
        const galaxy = document.getElementById('galaxy-section');
        for(let i=0; i<150; i++) {
            let star = document.createElement('div');
            star.className = 'star';
            star.style.left = Math.random() * 100 + 'vw';
            star.style.top = Math.random() * 100 + 'vh';
            let size = Math.random() * 3;
            star.style.width = size + 'px';
            star.style.height = size + 'px';
            star.style.animationDuration = (Math.random() * 2 + 1) + 's';
            galaxy.appendChild(star);
        }

        // --- Logic & Timers ---
        const startBtn = document.getElementById('start-btn');
        const poetryText = document.getElementById('poetry-text');
        const toGalaxyBtn = document.getElementById('to-galaxy-btn');
        const bgMusic = document.getElementById('bg-music');
        let poemIndex = 0;
        let poetryInterval;

        // Start button initiates audio and poetry
        startBtn.addEventListener('click', () => {
            // Play music (browsers require a click before playing audio)
            bgMusic.play().catch(e => console.log("Audio needs a file added!"));
            
            startBtn.style.display = 'none';
            toGalaxyBtn.style.display = 'block';
            
            // Show first poem immediately
            poetryText.innerText = poems[0];
            
            // Cycle through poetry every 4.5 seconds
            poetryInterval = setInterval(() => {
                poetryText.style.opacity = 0; // fade out
                setTimeout(() => {
                    poemIndex = (poemIndex + 1) % poems.length;
                    poetryText.innerText = poems[poemIndex];
                    poetryText.style.opacity = 1; // fade in
                }, 1000);
            }, 4500);
        });

        // Transition to Galaxy
        toGalaxyBtn.addEventListener('click', () => {
            clearInterval(poetryInterval); // stop changing text
            garden.style.opacity = 0; // fade out garden
            
            setTimeout(() => {
                garden.style.display = 'none';
                galaxy.style.pointerEvents = 'all';
                galaxy.style.opacity = 1; // fade in galaxy
            }, 2000);
        });
    </script>
</body>
</html>
